<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px -apple-system, system-ui, sans-serif; width: 260px; margin: 0; padding: 14px; color: #1d1d1f; }
      h1 { font-size: 13px; margin: 0 0 10px; }
      .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #c7c7cc; }
      .dot.on { background: #34c759; }
      .dot.off { background: #ff3b30; }
      button { font: inherit; padding: 6px 10px; border: 1px solid #d1d1d6; border-radius: 6px; background: #f5f5f7; cursor: pointer; }
      p { margin: 0; color: #6e6e73; }
    </style>
  </head>
  <body>
    <h1>TechTusCoWork Browser Bridge</h1>
    <div class="row"><span id="dot" class="dot"></span><span id="label">Checking…</span></div>
    <div class="row"><button id="reconnect">Reconnect host</button></div>
    <p>The desktop app drives your active tab through a local host. Page-changing actions are confirmed in the app first.</p>
    <script src="popup.js"></script>
  </body>
</html>
