name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    # Electron app is macOS-only and the _electron launcher needs a real GUI,
    # which macOS runners provide. This job never packages the app (no pack/dist),
    # so it stays light.
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
